set default="0"
set timeout="1"

menuentry "Batocera.linux (normal)" {
    echo Booting Batocera.linux... (grub2)
    linux /boot/linux label=BATOCERA console=tty3 quiet loglevel=0 vt.global_cursor_default=0 cgroup_no_v1=all intel_iommu=on amd_iommu=on iommu=pt kvm.ignore_msrs=1 kvm.report_ignored_msrs=0
    initrd /boot/initrd.gz
}

menuentry "Batocera.linux (verbose)" {
    echo Booting Batocera.linux... (grub2)
    linux /boot/linux label=BATOCERA vt.global_cursor_default=0 cgroup_no_v1=all intel_iommu=on amd_iommu=on iommu=pt kvm.ignore_msrs=1 kvm.report_ignored_msrs=0
    initrd /boot/initrd.gz
}
